spring:
  application:
    name: FairBid
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
      password: ${SPRING_DATA_REDIS_PASSWORD:}
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USER}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 20
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: FairBid-HikariPool
      data-source-properties:
        # DB 장애 시 커넥션이 무한 대기하지 않도록 소켓 타임아웃 설정
        # docker pause 등으로 DB가 응답 불가일 때 3초 후 커넥션 실패 → 빠른 장애 전파
        socketTimeout: 3000
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    # OSIV 활성화: imageUrls 등 Lazy 컬렉션의 Controller 레벨 로딩에 필요
    # 주의: 요청 전체에 걸쳐 DB 커넥션을 점유하므로 고부하 시 HikariCP 고갈 가능성 있음
    open-in-view: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
  # 서버 역할 분리 (REST/WebSocket 독립 스케일링)
  # - all: 모든 빈 활성화 (기본값, 로컬 개발)
  # - api: REST Controller + Redis Pub/Sub Publisher만 활성화
  # - ws: WebSocket + Redis Pub/Sub Subscriber만 활성화
  role: ${SERVER_ROLE:all}

# 프론트엔드 정적 리소스 경로
spring.web.resources:
  static-locations: file:../frontend/, classpath:/static/

logging:
  level:
    org.hibernate.SQL: ${LOG_LEVEL_HIBERNATE_SQL:DEBUG}
    com.cos.fairbid.admin: ${LOG_LEVEL_ADMIN:INFO}

# Actuator & Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics, wsconnections
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      # 응답시간 히스토그램 (p50, p95, p99 계산용)
      percentiles-histogram:
        http.server.requests: true
      # SLA 버킷 (50ms, 100ms, 200ms, 500ms, 1s 기준)
      slo:
        http.server.requests: 50ms, 100ms, 200ms, 500ms, 1s

# JWT 설정
jwt:
  secret-key: ${JWT_SECRET_KEY:dGhpc0lzQURlZmF1bHRTZWNyZXRLZXlGb3JEZXZlbG9wbWVudE9ubHlQbGVhc2VDaGFuZ2VJblByb2R1Y3Rpb24=}
  access-expiration: 1800000      # 30분 (밀리초)
  refresh-expiration: 1209600000  # 2주 (밀리초)

# OAuth2 클라이언트 설정
oauth2:
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/api/v1/auth/oauth2/callback/kakao}
  naver:
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}
    redirect-uri: ${NAVER_REDIRECT_URI:http://localhost:8080/api/v1/auth/oauth2/callback/naver}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/v1/auth/oauth2/callback/google}

# 앱 설정
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  cookie:
    secure: ${COOKIE_SECURE:true}
  admin:
    emails: ${ADMIN_EMAILS:}  # 콤마 구분 이메일 목록 (예: admin@test.com,admin2@test.com)

# 네이버 검색 API (시세 데이터 수집)
# - v2 Phase 1: Anthropic web_search 를 우리 검색 파이프라인으로 대체
# - NAVER_CLIENT_ID/SECRET 는 OAuth2 로그인과 동일한 환경변수 재사용
#   (네이버 Developers Console 에서 같은 앱에 "검색" API 권한 활성화 필요)
naver:
  search:
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}
    base-url: https://openapi.naver.com
    connect-timeout-ms: 3000
    read-timeout-ms: 5000

# AI 경매 어시스턴트 (Anthropic Claude)
# - api-key 미설정 시 /api/v1/ai/auction-assist 호출 시 503 으로 떨어진다
# - v1 은 캐싱 없이 매 요청마다 Claude API 를 그대로 호출한다
#   (프롬프트 캐싱과 Redis 시세 캐싱은 v2 도입 예정)
# - web_search: Claude 가 한국 중고 시세를 실시간 조회해 가격 정확도를 높임
#   호출당 비용이 약 2배(17원 → 40원) 늘지만 학습 데이터 시점 이후 시세 변동 반영 가능
ai:
  # AI 제공자 스위치. claude (기본) | openai
  # 런타임에 하나의 AiClientPort 구현체만 빈으로 등록되도록 ConditionalOnProperty 분기.
  provider: ${AI_PROVIDER:claude}
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${ANTHROPIC_MODEL:claude-sonnet-4-5}
    base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
    anthropic-version: 2023-06-01
    connect-timeout-ms: 5000
    read-timeout-ms: 60000
    max-tokens: 2000
    web-search-enabled: ${ANTHROPIC_WEB_SEARCH_ENABLED:false}
    web-search-max-uses: ${ANTHROPIC_WEB_SEARCH_MAX_USES:1}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4.1-mini}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    connect-timeout-ms: 5000
    read-timeout-ms: 60000
    max-tokens: 2000
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
    connect-timeout-ms: 5000
    read-timeout-ms: 60000
    max-tokens: 2000
  # SPEC §19 옵션 B: 설명 생성 전용 Gemini (가격용 ai.gemini 와 별도)
  # - 가격은 Claude (ai.provider=claude), 설명은 Gemini 2.5 Pro 로 역할 분할
  # - api-key 는 기본 GEMINI_API_KEY 공유. base-url 도 동일
  description:
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${AI_DESCRIPTION_GEMINI_MODEL:gemini-2.5-pro}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
      connect-timeout-ms: 5000
      read-timeout-ms: 60000
      max-tokens: 8000

# Discord Webhook — AI 어시스턴트 가드레일 주간 리포트 전송
# - webhook-url 미설정 시 리포트 전송 비활성화 (no-op)
# - cron: 기본 매주 월요일 09:00 KST. 환경변수로 오버라이드 가능.
# - 보안: webhook-url 은 절대 저장소에 하드코딩하지 말 것. 환경변수 DISCORD_AI_ASSIST_SOFT_WEBHOOK_URL 로 주입.
discord:
  ai-assist-soft:
    webhook-url: ${DISCORD_AI_ASSIST_SOFT_WEBHOOK_URL:}
    cron: ${DISCORD_AI_ASSIST_SOFT_CRON:0 0 9 * * MON}
    connect-timeout-ms: 3000
    read-timeout-ms: 5000