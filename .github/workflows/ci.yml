name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  issues: write

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      docker:
        image: docker:dind
        options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Build
        run: ./gradlew build -x test
        working-directory: backend

      # ArchUnit + 단위 + BDD 인수 테스트 (가드레일)
      - name: Test (ArchUnit + Unit + BDD)
        run: ./gradlew test
        working-directory: backend

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            backend/build/reports/tests/
            backend/build/reports/cucumber/

      # 테스트 실패 시 GitHub Issue 자동 생성 (피드백 루프)
      - name: Create issue on test failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const branch = context.ref.replace('refs/heads/', '');
            const sha = context.sha.substring(0, 7);

            await github.rest.issues.create({
              owner,
              repo,
              title: `[CI 실패] 테스트 실패 (${branch} @ ${sha})`,
              body: `## CI 테스트 실패\n\n` +
                    `- **브랜치**: \`${branch}\`\n` +
                    `- **커밋**: \`${sha}\`\n` +
                    `- **실행 로그**: ${runUrl}\n` +
                    `- **상태**: open\n\n` +
                    `> 이 Issue는 CI 실패 시 자동 생성됩니다. \`/evolve\` 스킬이 이 Issue를 분석합니다.`,
              labels: ['harness-failure']
            });

  docker:
    runs-on: ubuntu-latest
    needs: backend
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: fairbid:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
