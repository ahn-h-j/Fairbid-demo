name: CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ASG Instance Refresh로 롤링 배포
      # 새 인스턴스는 user-data에서 git pull → docker compose up --build 수행
      - name: Trigger ASG Instance Refresh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-2
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name fairbid-app-asg \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 120}'

          echo "✅ Instance Refresh 시작됨"
          echo "새 인스턴스가 최신 코드로 자동 배포됩니다."
