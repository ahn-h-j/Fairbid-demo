name: CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: fairbid-backend
  REST_ASG_NAME: fairbid-rest-asg
  WS_ASG_NAME: fairbid-websocket-asg

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # AWS 인증
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Docker 이미지 빌드 + ECR push
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "✅ 이미지 push 완료: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      # REST + WebSocket ASG 모두 Instance Refresh
      # 같은 이미지를 사용하므로 양쪽 다 롤링 배포
      - name: Trigger ASG Instance Refresh (REST + WebSocket)
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name $REST_ASG_NAME \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 120}'
          echo "✅ REST Instance Refresh 시작됨"

          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name $WS_ASG_NAME \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 120}'
          echo "✅ WebSocket Instance Refresh 시작됨"
