server {
    listen 80;
    server_name fairbid.shop www.fairbid.shop;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name fairbid.shop www.fairbid.shop;

    ssl_certificate /etc/letsencrypt/live/fairbid.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fairbid.shop/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 프론트엔드 정적 파일 (Vite 빌드 결과물)
    root /home/ubuntu/Fairbid/frontend/dist;
    index index.html;

    # React SPA: 모든 프론트 경로를 index.html로
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API → ALB → App 서버
    location /api/ {
        proxy_pass http://fairbid-alb-490283096.ap-northeast-2.elb.amazonaws.com;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket → ALB → App 서버
    location /ws {
        proxy_pass http://fairbid-alb-490283096.ap-northeast-2.elb.amazonaws.com;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Actuator (모니터링)
    location /actuator/ {
        proxy_pass http://fairbid-alb-490283096.ap-northeast-2.elb.amazonaws.com;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
