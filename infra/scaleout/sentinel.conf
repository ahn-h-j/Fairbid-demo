# Redis Sentinel 설정 (스케일아웃 환경)
#
# 로컬(docker-compose.yml)의 sentinel.conf와 달리, Master 주소를 EC2 private IP로 지정한다.
# 이렇게 해야 외부 App 서버가 Sentinel로부터 받는 Master 주소가 EC2 IP가 된다.
#
# Docker 내부에서도 EC2 IP(호스트 IP)로 Master에 접근 가능하므로
# sentinel monitor에 EC2 IP를 직접 사용해도 문제없다.
#
# INFRA_HOST는 docker-compose-infra.yml 실행 시 envsubst 또는 sed로 치환된다.
#
# 주요 설정:
#   - quorum 2: Sentinel 3대 중 2대가 동의해야 failover 진행
#   - down-after-milliseconds 5000: Master 무응답 5초 후 주관적 다운(sdown) 판정
#   - failover-timeout 10000: failover 전체 타임아웃 10초

port 26379

sentinel monitor mymaster INFRA_HOST_PLACEHOLDER 6379 2
sentinel down-after-milliseconds mymaster 5000
sentinel failover-timeout mymaster 10000
