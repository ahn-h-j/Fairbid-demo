services:
  # 백엔드 API 서버
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USER}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI:-http://localhost:8080/api/v1/auth/oauth2/callback/kakao}
      NAVER_REDIRECT_URI: ${NAVER_REDIRECT_URI:-http://localhost:8080/api/v1/auth/oauth2/callback/naver}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8080/api/v1/auth/oauth2/callback/google}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      # AI 경매 어시스턴트 (Anthropic Claude)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5}

  # 프론트엔드 (nginx)
  frontend:
    build:
      context: ./frontend
      args:
        VITE_CLOUDINARY_CLOUD_NAME: ${VITE_CLOUDINARY_CLOUD_NAME:-}
        VITE_CLOUDINARY_UPLOAD_PRESET: ${VITE_CLOUDINARY_UPLOAD_PRESET:-}
    ports:
      - "3000:80"
    depends_on:
      - backend

  mysql:
    image: mysql:8.0
    ports:
      # 호스트 3306/3307 이 다른 MySQL 에 의해 점유되어 있어 3308 로 매핑.
      # backend 컨테이너는 internal network 의 mysql:3306 으로 연결하므로 영향 없음.
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${SPRING_DATASOURCE_ROOT_PASSWORD}
      MYSQL_DATABASE: ${SPRING_DATASOURCE_DATABASE}
      MYSQL_USER: ${SPRING_DATASOURCE_USER}
      MYSQL_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    # min-replicas-to-write 1: Slave 연결 없으면 쓰기 거부 → split brain 방지
    # min-replicas-max-lag 10: 복제 지연 10초 이내인 Slave만 카운트
    command: redis-server --min-replicas-to-write 1 --min-replicas-max-lag 10
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      default:
        ipv4_address: 172.22.0.10

  # Redis Slave (HA Step 2: Replication)
  redis-slave-1:
    image: redis:7
    ports:
      - "6380:6379"
    command: redis-server --replicaof redis 6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      default:
        ipv4_address: 172.22.0.11

  redis-slave-2:
    image: redis:7
    ports:
      - "6381:6379"
    command: redis-server --replicaof redis 6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      default:
        ipv4_address: 172.22.0.12

  # ===== Redis Sentinel (HA Step 3) =====
  # Sentinel 3대가 Master를 감시하고, 장애 시 quorum(2/3) 투표로 자동 failover 수행.
  # 각 Sentinel은 sentinel.conf를 복사본으로 사용 (Sentinel이 런타임에 config를 수정하기 때문).
  sentinel-1:
    image: redis:7
    ports:
      - "26379:26379"
    volumes:
      - ./redis/sentinel.conf:/etc/redis/sentinel-template.conf:ro
    command: >
      sh -c "cp /etc/redis/sentinel-template.conf /etc/redis/sentinel.conf &&
             redis-sentinel /etc/redis/sentinel.conf"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      default:
        ipv4_address: 172.22.0.20

  sentinel-2:
    image: redis:7
    ports:
      - "26380:26379"
    volumes:
      - ./redis/sentinel.conf:/etc/redis/sentinel-template.conf:ro
    command: >
      sh -c "cp /etc/redis/sentinel-template.conf /etc/redis/sentinel.conf &&
             redis-sentinel /etc/redis/sentinel.conf"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      default:
        ipv4_address: 172.22.0.21

  sentinel-3:
    image: redis:7
    ports:
      - "26381:26379"
    volumes:
      - ./redis/sentinel.conf:/etc/redis/sentinel-template.conf:ro
    command: >
      sh -c "cp /etc/redis/sentinel-template.conf /etc/redis/sentinel.conf &&
             redis-sentinel /etc/redis/sentinel.conf"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      default:
        ipv4_address: 172.22.0.22

  # ===== 모니터링 =====
  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "9595:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:10.1.0
    ports:
      - "3001:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus

  # Redis 서버 메트릭 노출 (메모리, hit/miss, evictions 등)
  # AI Monitor가 redis_memory_used_bytes 등 표준 redis_* 메트릭을 사용한다.
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    ports:
      - "9121:9121"
    command:
      - '--redis.addr=redis://redis:6379'
    depends_on:
      redis:
        condition: service_healthy

  # AI 모니터링 에이전트
  # Prometheus를 주기적으로 폴링 → 룰 필터 → 이상 시 Claude API → Discord 발송
  ai-monitor:
    build: ./monitoring/ai-monitor
    env_file:
      - ./monitoring/ai-monitor/.env
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      STATE_DB_PATH: /data/state.db
      # daily_summary_time이 로컬 타임존 기준이라 Asia/Seoul 강제 (기본 UTC 회피)
      TZ: Asia/Seoul
    volumes:
      - ai_monitor_data:/data
      # config.yaml은 host에서 마운트 → 임계치/cooldown 조정 시 rebuild 없이 restart만으로 반영
      - ./monitoring/ai-monitor/config.yaml:/app/config.yaml:ro
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/24

volumes:
  mysql_data:
  redis_data:
  prometheus_data:
  grafana_data:
  ai_monitor_data:
