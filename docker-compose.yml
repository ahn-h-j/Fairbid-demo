services:
  # л°ұм—”л“ң API м„ңлІ„
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USER}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI:-http://localhost:8080/api/v1/auth/oauth2/callback/kakao}
      NAVER_REDIRECT_URI: ${NAVER_REDIRECT_URI:-http://localhost:8080/api/v1/auth/oauth2/callback/naver}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8080/api/v1/auth/oauth2/callback/google}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      # AI кІҪл§Ө м–ҙмӢңмҠӨн„ҙнҠё (Anthropic Claude)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5}

  # н”„лЎ нҠём—”л“ң (nginx)
  frontend:
    build:
      context: ./frontend
      args:
        VITE_CLOUDINARY_CLOUD_NAME: ${VITE_CLOUDINARY_CLOUD_NAME:-}
        VITE_CLOUDINARY_UPLOAD_PRESET: ${VITE_CLOUDINARY_UPLOAD_PRESET:-}
    ports:
      - "3000:80"
    depends_on:
      - backend

  mysql:
    image: mysql:8.0
    ports:
      # нҳёмҠӨнҠё 3306/3307 мқҙ лӢӨлҘё MySQL м—җ мқҳн•ҙ м җмң лҗҳм–ҙ мһҲм–ҙ 3308 лЎң л§Өн•‘.
      # backend м»Ён…Ңмқҙл„ҲлҠ” internal network мқҳ mysql:3306 мңјлЎң м—°кІ°н•ҳлҜҖлЎң мҳҒн–Ҙ м—ҶмқҢ.
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${SPRING_DATASOURCE_ROOT_PASSWORD}
      MYSQL_DATABASE: ${SPRING_DATASOURCE_DATABASE}
      MYSQL_USER: ${SPRING_DATASOURCE_USER}
      MYSQL_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    # min-replicas-to-write 1: Slave м—°кІ° м—Ҷмңјл©ҙ м“°кё° кұ°л¶Җ вҶ’ split brain л°©м§Җ
    # min-replicas-max-lag 10: ліөм ң м§Җм—° 10мҙҲ мқҙлӮҙмқё Slaveл§Ң м№ҙмҡҙнҠё
    command: redis-server --min-replicas-to-write 1 --min-replicas-max-lag 10
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      default:
        ipv4_address: 172.22.0.10

  # Redis Slave (HA Step 2: Replication)
  redis-slave-1:
    image: redis:7
    ports:
      - "6380:6379"
    command: redis-server --replicaof redis 6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      default:
        ipv4_address: 172.22.0.11

  redis-slave-2:
    image: redis:7
    ports:
      - "6381:6379"
    command: redis-server --replicaof redis 6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      default:
        ipv4_address: 172.22.0.12

  # ===== Redis Sentinel (HA Step 3) =====
  # Sentinel 3лҢҖк°Җ MasterлҘј к°җмӢңн•ҳкі , мһҘм•  мӢң quorum(2/3) нҲ¬н‘ңлЎң мһҗлҸҷ failover мҲҳн–ү.
  # к°Ғ SentinelмқҖ sentinel.confлҘј ліөмӮ¬ліёмңјлЎң мӮ¬мҡ© (Sentinelмқҙ лҹ°нғҖмһ„м—җ configлҘј мҲҳм •н•ҳкё° л•Ңл¬ё).
  sentinel-1:
    image: redis:7
    ports:
      - "26379:26379"
    volumes:
      - ./redis/sentinel.conf:/etc/redis/sentinel-template.conf:ro
    command: >
      sh -c "cp /etc/redis/sentinel-template.conf /etc/redis/sentinel.conf &&
             redis-sentinel /etc/redis/sentinel.conf"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      default:
        ipv4_address: 172.22.0.20

  sentinel-2:
    image: redis:7
    ports:
      - "26380:26379"
    volumes:
      - ./redis/sentinel.conf:/etc/redis/sentinel-template.conf:ro
    command: >
      sh -c "cp /etc/redis/sentinel-template.conf /etc/redis/sentinel.conf &&
             redis-sentinel /etc/redis/sentinel.conf"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      default:
        ipv4_address: 172.22.0.21

  sentinel-3:
    image: redis:7
    ports:
      - "26381:26379"
    volumes:
      - ./redis/sentinel.conf:/etc/redis/sentinel-template.conf:ro
    command: >
      sh -c "cp /etc/redis/sentinel-template.conf /etc/redis/sentinel.conf &&
             redis-sentinel /etc/redis/sentinel.conf"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      default:
        ipv4_address: 172.22.0.22

  # ===== лӘЁлӢҲн„°л§Ғ =====
  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "9595:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:10.1.0
    ports:
      - "3001:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/24

volumes:
  mysql_data:
  redis_data:
  prometheus_data:
  grafana_data:
